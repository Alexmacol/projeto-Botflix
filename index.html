<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="BotFlix - Seu assistente pessoal de filmes" />

    <link
      rel="preconnect"
      href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin />
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com" />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Inter:wght@400;500&display=swap"
      rel="stylesheet" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <title>BotFlix - Seu assistente pessoal de filmes</title>

    <link
      rel="stylesheet"
      href="src/css/reset.css" />
    <link
      rel="stylesheet"
      href="src/css/styles.css" />

    <link
      rel="stylesheet"
      href="src/css/responsive.css"
      media="(max-width: 768px)" />
  </head>
  <body>
    <div class="bg"></div>
    <div class="bg bg2"></div>
    <div class="bg bg3"></div>

    <main class="container">
      <div class="main-content">
        <header class="brand-header">
          <div class="container-logo">
            <img
              src="src/images/botflix.webp"
              alt="Assistente robô futurista em pé, com luzes azuis brilhantes nos fones de ouvido e ombros, vestindo um traje branco e preto elegante em um ambiente moderno e pouco iluminado. O robô parece calmo e acessível. O texto BotFlix é exibido próximo."
              class="robot-image" />

            <h1 class="brand-title">BotFlix</h1>
          </div>

          <p class="brand-subtitle">
            Seu assistente pessoal para encontrar o filme perfeito
          </p>
        </header>

        <section class="search-card">
          <div class="search-content">
            <div class="input-container">
              <label
                for="mood-textarea"
                class="visually-hidden"></label>
              <textarea
                rows="3"
                class="mood-textarea"
                id="mood-textarea"
                placeholder="Digite o que você está sentindo ou quer assistir..."></textarea>
            </div>

            <div class="examples">
              <h3 class="examples-title">Exemplos:</h3>
              <ul class="examples-list">
                <li>Quero algo engraçado para relaxar</li>
                <li>Estou procurando um thriller tenso / agitado</li>
                <li>Algo romântico para assistir com a namorada</li>
              </ul>
            </div>

            <button
              type="button"
              id="search-button"
              class="search-button">
              <span class="play-icon">&#9654;</span>
              Buscar Filme
            </button>
          </div>
        </section>
      </div>

      <div
        id="results-container"
        class="results-container">
        <div
          id="results"
          class="results">
          <button
            type="button"
            id="new-search-button"
            class="new-search-button">
            <span class="play-icon">&#9654;</span>
            Nova Busca
          </button>
          <div
            id="movies-grid"
            class="movies-grid"></div>
          <div
            id="movie"
            class="movie"></div>
          <div class="movies-grid"></div>
        </div>
      </div>
    </main>

    <div
      id="custom-alert"
      class="modal-alert">
      <div class="modal-content">
        <p id="alert-message"></p>
        <button
          id="close-alert"
          class="close-button">
          OK
        </button>
      </div>
    </div>

    <footer class="footer">
      <div class="interface">
        <ul class="footer-links">
          <li>
            <a
              href="https://github.com/Alexmacol"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Visitar perfil no GitHub">
              <i class="fa-brands fa-github footer-icon"></i>
            </a>
          </li>
          <li>
            <a
              href="mailto:alexmacol@gmail.com"
              aria-label="Enviar email">
              <i class="fa-solid fa-envelope footer-icon"></i>
            </a>
          </li>
        </ul>
        <div class="footer-text-center">
          <p>Todos os direitos reservados © 2026</p>
        </div>
      </div>
    </footer>

    <script
      src="src/js/main.js"
      type="module"></script>
  </body>
</html>
